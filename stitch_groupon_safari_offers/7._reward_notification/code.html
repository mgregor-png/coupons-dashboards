<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Value Architect - Notification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

                        "secondary-container": "#99defd",
                        "inverse-primary": "#87dc4f",

                        "primary-fixed-dim": "#87dc4f",
                        "primary": "#2f6900",
                        "on-surface": "#161c26",
                        "surface-dim": "#d5dae9",
                        "background": "#f9f9ff",
                        "tertiary": "#006b19",
                        "primary-fixed": "#a2f968",
                        "on-tertiary": "#ffffff",

                        "on-background": "#161c26",
                        "error-container": "#ffdad6",

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .ios-blur {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black flex items-center justify-center min-h-screen">
<!-- Mobile Screen Simulator Container -->
<div class="relative w-[390px] h-[844px] overflow-hidden rounded-[3rem] shadow-2xl border-[8px] border-slate-900 bg-slate-900">
<!-- Gradient Wallpaper -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-gradient-to-br from-primary via-secondary to-tertiary opacity-80" data-alt="vibrant abstract gradient wallpaper with flowing shades of emerald green, deep azure blue, and forest green with soft grain texture"></div>
<div class="absolute inset-0 bg-black/10"></div>
</div>
<!-- Lock Screen Status Bar -->
<div class="absolute top-0 left-0 w-full px-8 pt-4 flex justify-between items-center z-20 text-white">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- Lock Screen Clock -->
<div class="absolute top-28 left-0 w-full flex flex-col items-center z-10 text-white/90">
<p class="text-lg font-medium opacity-80 mb-1">Wednesday, October 23</p>
<h1 class="text-8xl font-bold tracking-tight">9:41</h1>
</div>
<!-- Notification Container -->
<div class="absolute inset-x-0 bottom-40 flex flex-col px-4 gap-3 z-30">
<!-- The Notification Card -->
<div class="ios-blur bg-white/70 rounded-[2rem] p-4 shadow-lg border border-white/20 transition-transform active:scale-95 duration-200">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<div class="w-7 h-7 rounded-lg bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[16px]" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<span class="text-xs font-bold text-slate-800 tracking-wide">THE VALUE ARCHITECT</span>
</div>
<span class="text-[10px] font-medium text-slate-500">now</span>
</div>
<div class="space-y-1">
<h3 class="text-[15px] font-bold text-slate-900 leading-tight">You earned $2.40 Bucks from Nike.</h3>
<p class="text-[14px] font-medium text-slate-700 leading-snug">Your balance: $14.60. Tap to browse local deals.</p>
</div>
</div>
<!-- Hint text for lock screen -->
<div class="text-center mt-4">
<p class="text-white/60 text-xs font-medium tracking-wide uppercase">Swipe up to open</p>
</div>
</div>
<!-- Lock Screen Bottom Controls -->
<div class="absolute bottom-12 left-0 w-full px-8 flex justify-between items-center z-20">
<div class="w-12 h-12 rounded-full bg-black/30 backdrop-blur-md flex items-center justify-center text-white">
<span class="material-symbols-outlined">flashlight_on</span>
</div>
<div class="w-12 h-12 rounded-full bg-black/30 backdrop-blur-md flex items-center justify-center text-white">
<span class="material-symbols-outlined">photo_camera</span>
</div>
</div>
<!-- iOS Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white rounded-full opacity-60 z-20"></div>
</div>
<!-- Hidden Narrative Caption for Context -->
<div class="fixed bottom-10 text-white/40 text-sm max-w-xs text-center pointer-events-none">
        A push notification brings the user back to the Groupon app
    </div>
</body></html>
