<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "outline": "#717a67",
                    "inverse-on-surface": "#edf0ff",
                    "secondary-fixed-dim": "#8bd0ef",
                    "on-secondary-fixed": "#001f2a",
                    "on-tertiary-fixed-variant": "#005311",
                    "surface-container-lowest": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface-tint": "#306b00",
                    "secondary-container": "#99defd",
                    "inverse-primary": "#87dc4f",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#87dc4f",
                    "primary": "#2f6900",
                    "on-surface": "#161c26",
                    "surface-dim": "#d5dae9",
                    "background": "#f9f9ff",
                    "tertiary": "#006b19",
                    "primary-fixed": "#a2f968",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed": "#002203",
                    "tertiary-container": "#188729",
                    "surface-container-highest": "#dee2f1",
                    "surface-bright": "#f9f9ff",
                    "tertiary-fixed": "#91fa8c",
                    "surface-variant": "#dee2f1",
                    "secondary": "#116682",
                    "outline-variant": "#c0cab4",
                    "surface-container-high": "#e4e8f7",
                    "surface-container": "#e9edfd",
                    "on-surface-variant": "#414a39",
                    "secondary-fixed": "#bde9ff",
                    "tertiary-fixed-dim": "#75dd73",
                    "inverse-surface": "#2b303c",
                    "primary-container": "#3d8400",
                    "on-tertiary-container": "#f7fff1",
                    "on-primary-fixed": "#0a2100",
                    "on-primary-container": "#f9ffed",
                    "on-background": "#161c26",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "surface-container-low": "#f1f3ff",
                    "surface": "#f9f9ff",
                    "on-primary-fixed-variant": "#235100",
                    "on-secondary-fixed-variant": "#004d64",
                    "on-secondary-container": "#0a637f",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background min-h-screen">
<!-- Browser Background Emulation (Checkout Page) -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-40 select-none">
<div class="max-w-4xl mx-auto mt-20 p-8 flex flex-col gap-8">
<div class="h-12 w-48 bg-surface-container-highest rounded-xl"></div>
<div class="grid grid-cols-3 gap-8">
<div class="col-span-2 space-y-6">
<div class="h-64 w-full bg-surface-container rounded-2xl"></div>
<div class="h-32 w-full bg-surface-container-low rounded-2xl"></div>
</div>
<div class="space-y-4">
<div class="h-80 w-full bg-surface-container-high rounded-2xl"></div>
</div>
</div>
</div>
</div>
<!-- Success State Overlay (Extension Interface) -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
<!-- Main Success Card -->
<div class="glass-panel w-full max-w-[420px] rounded-[2rem] shadow-2xl overflow-hidden border border-white/20">
<!-- Top App Bar Emulation -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-slate-50/85 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-2">
<span class="text-xl font-bold tracking-tight text-green-800 font-headline">The Value Architect</span>
</div>
<div class="flex items-center gap-3">
<div class="p-2 hover:bg-slate-200/50 rounded-full transition-all duration-200 ease-in-out cursor-pointer">
<span class="material-symbols-outlined text-slate-500">notifications</span>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden">
<img class="w-full h-full object-cover" data-alt="professional portrait of a friendly man with a warm smile in clean studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAjXUvslPIVt6dfD0kcBhi2xMPa5qnAi7nRgOi9ojz1q46stw_Vi-hFUEYa4OGNmcSXQIDJjiMWFoEOWKXyCHGYP8e8XSV3QWgRAFNeblrSdgacvFYL8P56A4d5lx2aXsj2VK-cpJ1mmuPH2_5U2jsDXxq1309_BqXHLlBCWpkJuL4uCYy8qqI3wmOq7VeL5p5VtN0X_kPXuYG5HO2l2NSTQ8pLtcRLbPsneS2hIw9SZfpx80aLL8nNcmHD3dUlkwXIcVgbMD4HzmXM"/>
</div>
</div>
</header>
<div class="p-8 flex flex-col items-center text-center">
<!-- Large Green Checkmark Circle -->
<div class="relative mb-8">
<div class="absolute inset-0 bg-primary/10 rounded-full scale-150 blur-xl"></div>
<div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-lg relative z-10">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</div>
<!-- Headline Content -->
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-2 font-headline">Code Applied!</h1>
<p class="text-xl font-semibold text-primary mb-8">You saved $19.50</p>
<!-- Pricing Asymmetric Card -->
<div class="w-full bg-surface-container-low rounded-xl p-6 mb-6 flex flex-col gap-4 relative overflow-hidden">
<!-- Decorative Background Gradient for Price Card -->
<div class="absolute -right-12 -top-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl"></div>
<div class="flex justify-between items-center">
<span class="text-slate-500 font-medium">New Total</span>
<span class="text-3xl font-bold text-on-surface font-headline">$110.50</span>
</div>
<div class="h-px bg-outline-variant/20 w-full"></div>
<div class="flex items-center gap-3 text-tertiary">
<div class="w-10 h-10 rounded-xl bg-tertiary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div class="text-left">
<p class="font-bold text-sm leading-tight">+ $2.40 Groupon Bucks earned</p>
<p class="text-xs opacity-70">Will be available after purchase</p>
</div>
</div>
</div>
<!-- Caption -->
<p class="text-slate-500 text-sm mb-8 italic">Code applied automatically - and Bucks earned</p>
<!-- Primary Action -->
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-white rounded-xl font-bold text-lg shadow-md hover:shadow-lg transition-all duration-200 active:scale-[0.98]">
                    Continue to Checkout
                </button>
<button class="mt-4 text-secondary font-semibold text-sm hover:underline transition-all">
                    View Applied Coupons
                </button>
</div>
<!-- Reward Streak Progress Visualization -->
<div class="px-8 pb-8">
<div class="flex justify-between items-end mb-2">
<span class="text-[10px] font-bold tracking-widest uppercase text-slate-400">Reward Progress</span>
<span class="text-xs font-bold text-primary">Level 4 Artisan</span>
</div>
<div class="w-full h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-tertiary w-4/5 rounded-full"></div>
</div>
<p class="mt-2 text-[10px] text-slate-400 text-center">Only $12.50 more for your next $5 reward</p>
</div>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 w-1/2 h-screen bg-gradient-to-l from-primary/5 to-transparent -z-10"></div>
<div class="fixed bottom-0 left-0 w-1/3 h-2/3 bg-gradient-to-tr from-secondary/5 to-transparent -z-10"></div>
</body></html>
