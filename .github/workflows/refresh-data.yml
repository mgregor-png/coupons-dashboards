name: Refresh Phase 2 Data

on:
  schedule:
    # Run daily at 7:00 UTC (9:00 CET) - after BQ data refreshes overnight
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run data refresh
        run: python scripts/refresh-data.py

      - name: Install certifi for HTTPS calls
        run: pip install certifi

      - name: Refresh PostHog data
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: python scripts/refresh-posthog.py
        continue-on-error: true  # don't fail the cron if PostHog API has a hiccup

      - name: Compute day-of-week (UTC)
        id: dow
        # Mon=1 .. Sun=7. Mirror on Sunday so GIQ reflects a full week of fresh data.
        run: echo "dow=$(date -u +%u)" >> "$GITHUB_OUTPUT"

      - name: Mirror to Groupon IQ (Sundays + manual triggers)
        if: steps.dow.outputs.dow == '7' || github.event_name == 'workflow_dispatch'
        env:
          GROUPON_IQ_TOKEN: ${{ secrets.GROUPON_IQ_TOKEN }}
        run: python scripts/mirror-to-iq.py
        continue-on-error: true  # don't fail the cron if GIQ has a hiccup

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANGES=$(git diff --cached --stat)
          if [ -n "$CHANGES" ]; then
            git commit -m "Auto-refresh Phase 2 data $(date -u +%Y-%m-%d)

          Data updated from BigQuery rep.12_offer_dashboard.
          Triggered by: ${{ github.event_name }}"
            git push
            echo "✅ Data refreshed and pushed"
          else
            echo "ℹ️ No data changes detected"
          fi
