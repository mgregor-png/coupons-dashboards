<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .asymmetric-clip {
            border-radius: 1rem 0 1rem 0;
        }
        .safari-address-bar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
        }
        body {
          min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-surface text-on-surface">
<!-- Safari Browser UI Shell -->
<header class="sticky top-0 z-[60] safari-address-bar border-b border-outline-variant/10">
<div class="max-w-6xl mx-auto px-4 py-2 flex items-center gap-4">
<div class="flex gap-2">
<div class="w-3 h-3 rounded-full bg-[#FF5F57]"></div>
<div class="w-3 h-3 rounded-full bg-[#FFBD2E]"></div>
<div class="w-3 h-3 rounded-full bg-[#28C840]"></div>
</div>
<div class="flex-1 flex justify-center">
<div class="bg-surface-container-high rounded-lg px-4 py-1.5 flex items-center gap-2 w-full max-w-md text-on-surface-variant text-sm">
<span class="material-symbols-outlined text-base">lock</span>
<span class="flex-1 text-center font-medium">groupon.com</span>
<span class="material-symbols-outlined text-base">refresh</span>
</div>
</div>
<div class="flex gap-3 text-on-surface-variant">
<span class="material-symbols-outlined">share</span>
<span class="material-symbols-outlined">add</span>
<span class="material-symbols-outlined">content_copy</span>
</div>
</div>
</header>
<!-- Navigation -->
<nav class="bg-white px-6 py-2 flex justify-between items-center z-40">
<div class="flex items-center">
<span class="text-2xl font-black tracking-tight text-primary">GROUPON</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined font-light">search</span>
<span class="material-symbols-outlined font-light">favorite</span>
<span class="material-symbols-outlined font-light">shopping_bag</span>
</div>
</nav>
<main class="max-w-7xl mx-auto px-4 py-4 pb-20">
<div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
<!-- Compact Product Image Gallery -->
<div class="lg:col-span-7 grid grid-cols-1 gap-2">
<div class="relative aspect-[4/3]">
<img class="w-full h-auto rounded-xl bg-surface-container-low object-cover" data-alt="Nike Air Max 90 sneaker" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBY78uAOzLUS9l-kKda79TMFXw64EhJkXaoP1ETcL6Jo75fmUgQ1uGt-Nky7xRZvZv3PLWSAMgMWhmtxcDh_9_n1IbanLA25rArN6pu8tvBfvAySoc2-PvYA1c8YQRvP9sMg4gl_L-H7bzlkhDZpGvVAwOS5XAFvFPFF2_SjTKnRRWWFSI4NX-fEZ3R3B5qRfuhOXlbQiqu2M1Lsy_SlOBlxLWxuodRVoBO8oG-Iw9hMjyz6nlH-Cyfu00_oYHwGWTDe-ifvnpA504"/>
</div>
</div>
<!-- Condensed Product Details -->
<div class="lg:col-span-5 flex flex-col gap-4">
<header>
<p class="text-tertiary font-bold tracking-widest text-[10px] uppercase mb-1">Sustainable Materials</p>
<h1 class="text-2xl font-extrabold tracking-tighter leading-tight">Nike Air Max 90</h1>
<p class="text-sm font-medium text-on-surface-variant">Men's Shoes</p>
<p class="mt-2 text-2xl font-bold">$130.00</p>
</header>
<!-- Color Swatches -->
<div>
<p class="text-xs font-semibold mb-2">Select Color</p>
<div class="flex gap-2">
<div class="w-10 h-10 rounded-lg bg-surface-container-highest border-2 border-on-surface p-0.5">
<div class="w-full h-full bg-red-600 rounded-md"></div>
</div>
<div class="w-10 h-10 rounded-lg bg-surface-container-low p-0.5 hover:border-2 border-outline-variant/50">
<div class="w-full h-full bg-black rounded-md"></div>
</div>
<div class="w-10 h-10 rounded-lg bg-surface-container-low p-0.5 hover:border-2 border-outline-variant/50">
<div class="w-full h-full bg-blue-600 rounded-md"></div>
</div>
</div>
</div>
<!-- Size Selection -->
<div>
<div class="flex justify-between mb-2">
<p class="text-xs font-semibold">Select Size</p>
<button class="text-slate-500 font-medium text-[10px] uppercase tracking-wider">Size Guide</button>
</div>
<div class="grid grid-cols-4 gap-1">
<button class="py-2 text-sm border border-outline-variant rounded-md hover:border-on-surface">US 8</button>
<button class="py-2 text-sm border border-on-surface bg-surface-container-low rounded-md font-bold">US 9</button>
<button class="py-2 text-sm border border-outline-variant rounded-md hover:border-on-surface">US 10</button>
<button class="py-2 text-sm border border-outline-variant rounded-md hover:border-on-surface">US 11</button>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-2">
<button class="w-full bg-black text-white py-3.5 rounded-full font-bold text-base hover:bg-slate-800 transition-colors">
                        Add to Bag
                    </button>
<button class="w-full border border-outline-variant py-3.5 rounded-full font-bold text-base flex items-center justify-center gap-2">
                        Favorite
                        <span class="material-symbols-outlined text-base">favorite</span>
</button>
</div>
</div>
</div>
</main>
</body></html>
